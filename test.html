<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard测试</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .tab-btn.active { background-color: #4F46E5; color: white; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <!-- 顶部导航 -->
  <header class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white p-4 shadow-lg">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold">📊 轻资运营局 · 运营战报</h1>
      <div class="text-sm">
        <span>数据状态: 2月✅ · 3月✅ · 4月✅ · 5月✅ · 6月✅</span>
      </div>
    </div>
  </header>

  <!-- Tab按钮 -->
  <div class="bg-white border-b sticky top-0 z-10">
    <div class="max-w-6xl mx-auto flex">
      <button class="tab-btn active px-6 py-3 font-medium border-b-2 border-indigo-600" onclick="showTab('overview',this)">战报总览</button>
      <button class="tab-btn px-6 py-3 font-medium text-gray-500 hover:text-gray-700" onclick="showTab('monthly',this)">本月战报</button>
      <button class="tab-btn px-6 py-3 font-medium text-gray-500 hover:text-gray-700" onclick="showTab('history',this)">历史全榜</button>
      <button class="tab-btn px-6 py-3 font-medium text-gray-500 hover:text-gray-700" onclick="showTab('sources',this)">流量来源</button>
      <button class="tab-btn px-6 py-3 font-medium text-gray-500 hover:text-gray-700" onclick="showTab('topics',this)">话题地图</button>
    </div>
  </div>

  <!-- Tab内容 -->
  <main class="max-w-6xl mx-auto p-6">
    <!-- 战报总览 -->
    <div id="tab-overview" class="tab-content active">
      <h2 class="text-2xl font-bold mb-6">战报总览</h2>
      
      <!-- KPI卡片 -->
      <div class="grid grid-cols-4 gap-4 mb-6">
        <div class="bg-white rounded-xl p-4 shadow">
          <div class="text-gray-500 text-sm">累计发布</div>
          <div class="text-3xl font-bold text-indigo-600">93篇</div>
        </div>
        <div class="bg-white rounded-xl p-4 shadow">
          <div class="text-gray-500 text-sm">累计阅读</div>
          <div class="text-3xl font-bold text-green-600">12,903</div>
        </div>
        <div class="bg-white rounded-xl p-4 shadow">
          <div class="text-gray-500 text-sm">篇均阅读</div>
          <div class="text-3xl font-bold text-blue-600">139</div>
        </div>
        <div class="bg-white rounded-xl p-4 shadow">
          <div class="text-gray-500 text-sm">爆款率</div>
          <div class="text-3xl font-bold text-purple-600">8.6%</div>
        </div>
      </div>

      <!-- 图表区域 -->
      <div class="grid grid-cols-2 gap-6 mb-6">
        <div class="bg-white rounded-xl p-6 shadow">
          <h3 class="font-bold mb-4">每月每周阅读对比（1-12月）</h3>
          <canvas id="compareChart" height="200"></canvas>
        </div>
        <div class="bg-white rounded-xl p-6 shadow">
          <h3 class="font-bold mb-4">渠道分布</h3>
          <canvas id="channelChart" height="200"></canvas>
        </div>
      </div>
    </div>

    <!-- 本月战报 -->
    <div id="tab-monthly" class="tab-content">
      <h2 class="text-2xl font-bold mb-6">本月战报</h2>
      <p>本月战报内容...</p>
    </div>

    <!-- 历史全榜 -->
    <div id="tab-history" class="tab-content">
      <h2 class="text-2xl font-bold mb-6">历史全榜</h2>
      <p>历史全榜内容...</p>
    </div>

    <!-- 流量来源 -->
    <div id="tab-sources" class="tab-content">
      <h2 class="text-2xl font-bold mb-6">流量来源</h2>
      <p>流量来源内容...</p>
    </div>

    <!-- 话题地图 -->
    <div id="tab-topics" class="tab-content">
      <h2 class="text-2xl font-bold mb-6">话题地图</h2>
      <p>话题地图内容...</p>
    </div>
  </main>

  <script>
    function showTab(name, btn) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      if (btn) btn.classList.add('active');
    }

    // 每月每周阅读对比图表
    new Chart(document.getElementById('compareChart'), {
      type: 'bar',
      data: {
        labels: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
        datasets: [{
          label: '阅读',
          data: [0,0,0,0,1981,564,0,0,0,0,0,0],
          backgroundColor: 'rgba(79,70,229,0.85)',
          borderRadius: 8
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false }
        },
        scales: {
          y: { beginAtZero: true }
        }
      }
    });

    // 渠道分布饼图
    new Chart(document.getElementById('channelChart'), {
      type: 'doughnut',
      data: {
        labels: ['推荐','聊天会话','朋友圈','其他'],
        datasets: [{
          data: [71.6, 8.1, 5.8, 14.5],
          backgroundColor: ['#7C3AED','#60A5FA','#34D399','#94A3B8']
        }]
      },
      options: {
        responsive: true,
        cutout: '60%'
      }
    });
  </script>
</body>
</html>
